services:
  client:
    build: ./socket-proxy-client
    container_name: webhook-proxy-client
    ports:
      - "3001:3001"
    environment:
      - SERVER_URL=${SERVER_URL}
      - API_SECRET=${API_SECRET}
      - CLIENT_PORT=3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - client-data:/app/data
    restart: unless-stopped

volumes:
  client-data:
